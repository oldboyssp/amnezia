<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap");
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;font-family:"Montserrat",sans-serif;background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 70%);overflow:hidden;animation:fadeIn 1.2s ease}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:#0ff;border-radius:50%;box-shadow:0 0 6px #0ff,0 0 12px #0ff;animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.8}90%{opacity:0.2}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
.header{text-align:center;margin-top:5vh;margin-bottom:20px;z-index:1;animation:slideDown 0.8s ease}
.header h1{color:#fff;font-weight:900;font-size:46px;letter-spacing:10px;text-shadow:0 0 10px rgba(255,255,255,0.5),0 0 30px rgba(255,255,255,0.15)}
.slogan{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:4px;margin-top:6px;font-weight:400}
@keyframes slideDown{0%{transform:translateY(-30px);opacity:0}100%{transform:translateY(0);opacity:1}}
.buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px;z-index:1}
.btn{display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;padding:24px 20px;border-radius:14px;text-decoration:none;font-weight:700;letter-spacing:2px;transition:all 0.5s cubic-bezier(0.16,1,0.3,1);color:#fff;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);text-align:center;position:relative;overflow:hidden;animation:btnIn 0.8s ease backwards}
.btn:nth-child(1){animation-delay:0.3s}
.btn:nth-child(2){animation-delay:0.5s}
.btn:nth-child(3){animation-delay:0.7s}
.btn:nth-child(4){animation-delay:0.9s}
@keyframes btnIn{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
.btn:active{transform:scale(0.94)}
.btn:active::after{content:"";position:absolute;top:50%;left:50%;width:100px;height:100px;background:rgba(0,255,255,0.3);border-radius:50%;transform:translate(-50%,-50%) scale(0);animation:ripple 0.4s ease}
@keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.btn .title{font-size:17px;font-weight:700;letter-spacing:3px;margin-bottom:5px}
.btn .desc{font-size:11px;font-weight:400;letter-spacing:1px;opacity:0.5}
.btn-neon{background:rgba(0,0,0,0.7);border:1px solid rgba(0,255,255,0.5);box-shadow:0 0 10px rgba(0,255,255,0.25),0 0 20px rgba(0,255,255,0.1),inset 0 0 10px rgba(0,255,255,0.04),0 6px 24px rgba(0,0,0,0.5)}
.btn-neon:hover{border-color:rgba(0,255,255,0.9);box-shadow:0 0 15px rgba(0,255,255,0.5),0 0 30px rgba(0,255,255,0.3),inset 0 0 15px rgba(0,255,255,0.08),0 6px 24px rgba(0,0,0,0.6)}
.btn-neon:hover .desc{opacity:0.85}
.btn-white{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.15);box-shadow:0 0 8px rgba(255,255,255,0.03),0 6px 24px rgba(0,0,0,0.5)}
.btn-white:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.35);box-shadow:0 0 12px rgba(255,255,255,0.08),0 6px 24px rgba(0,0,0,0.6)}
.btn-white:hover .desc{opacity:0.85}
.contact{position:fixed;bottom:25px;text-align:center;z-index:1;animation:fadeIn 1.5s ease}
.contact a{color:rgba(255,255,255,0.4);text-decoration:none;font-size:12px;font-weight:400;letter-spacing:3px;transition:all 0.3s;text-shadow:0 0 10px rgba(0,255,255,0.3)}
.contact a:hover{color:#fff;text-shadow:0 0 15px rgba(0,255,255,0.6)}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="header">
<h1>АМНЕЗИЯ</h1>
<p class="slogan">ты забыл, но мы помним</p>
</div>
<div class="buttons">
<a href="go.html?url=https://t.me/kapolam" class="btn btn-neon"><span class="title">🌍 GEO</span><span class="desc">Геолокация и карты</span></a>
<a href="go.html?url=https://t.me/+A302DQ76v3kxMjE1" class="btn btn-white"><span class="title">📁 ПРОЕКТ</span><span class="desc">Основной проект</span></a>
<a href="go.html?url=http://t.me/antiseach_bot" class="btn btn-neon"><span class="title">🔍 БОТ ПОИСК</span><span class="desc">Поиск информации</span></a>
<a href="go.html?url=https://t.me/+e0Uj8Cmp8FA0ZGM1" class="btn btn-white"><span class="title">💬 ФОРУМ</span><span class="desc">Общение и обсуждения</span></a>
</div>
<div class="contact">
<a href="https://t.me/kepber">СВЯЗЬ: @KEPBER</a>
</div>
<script>
const p=document.getElementById("particles");
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="particle";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=6+Math.random()*10+"s";
d.style.animationDelay=Math.random()*8+"s";
d.style.width=1+Math.random()*2+"px";
d.style.height=d.style.width;
p.appendChild(d);
}
</script>
</body>
</html>
