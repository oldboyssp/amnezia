<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif}
p{color:#fff;font-size:18px}
</style>
</head>
<body>
<p id="msg">Переходим...</p>
<script>
const url = new URLSearchParams(window.location.search).get("url");
if (url) {
setTimeout(function(){ window.location.href = url; }, 500);
} else {
document.getElementById("msg").textContent = "Ошибка: ссылка не указана";
}
</script>
</body>
</html>
